<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260">
<defs>
  <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#26C6DA"/>
    <stop offset="30%" stop-color="#7B61FF"/>
    <stop offset="65%" stop-color="#FB923C"/>
    <stop offset="100%" stop-color="#F472B6"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<rect width="700" height="260" fill="#0F1420"/>
<text x="30" y="34" fill="#F8FAFF" font-size="16" font-family="'Syne',sans-serif" font-weight="900">Tu camino en BYZAI</text>
<text x="30" y="52" fill="#7E8798" font-size="10" font-family="'DM Sans',sans-serif">9 niveles, un solo recorrido</text>

<path d="M50 130 L650 130" stroke="url(#pathGrad)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

<g font-family="'DM Sans',sans-serif">
<!-- Level 0 - active, larger, glowing -->
<circle cx="50" cy="130" r="15" fill="#0F1420" stroke="#26C6DA" stroke-width="2.5" filter="url(#glow)"/>
<circle cx="50" cy="130" r="7" fill="#26C6DA"/>
<text x="50" y="158" fill="#26C6DA" font-size="9" text-anchor="middle" font-weight="700">ORIGINS</text>

<circle cx="125" cy="130" r="11" fill="#1E2533" stroke="#468BFF" stroke-width="1.5"/>
<text x="125" y="158" fill="#7E8798" font-size="8" text-anchor="middle">EXPLORER</text>

<circle cx="200" cy="130" r="11" fill="#1E2533" stroke="#A78BFA" stroke-width="1.5"/>
<text x="200" y="158" fill="#7E8798" font-size="8" text-anchor="middle">THINKER</text>

<circle cx="275" cy="130" r="11" fill="#1E2533" stroke="#36D399" stroke-width="1.5"/>
<text x="275" y="158" fill="#7E8798" font-size="8" text-anchor="middle">CREATOR</text>

<circle cx="350" cy="130" r="11" fill="#1E2533" stroke="#7B61FF" stroke-width="1.5"/>
<text x="350" y="158" fill="#7E8798" font-size="8" text-anchor="middle">BUILDER</text>

<circle cx="425" cy="130" r="11" fill="#1E2533" stroke="#26C6DA" stroke-width="1.5"/>
<text x="425" y="158" fill="#7E8798" font-size="8" text-anchor="middle">ARCHITECT</text>

<circle cx="500" cy="130" r="11" fill="#1E2533" stroke="#FB923C" stroke-width="1.5"/>
<text x="500" y="158" fill="#7E8798" font-size="8" text-anchor="middle">FOUNDER</text>

<circle cx="575" cy="130" r="11" fill="#1E2533" stroke="#36D399" stroke-width="1.5"/>
<text x="575" y="158" fill="#7E8798" font-size="8" text-anchor="middle">RESEARCHER</text>

<circle cx="650" cy="130" r="11" fill="#1E2533" stroke="#F472B6" stroke-width="1.5"/>
<text x="650" y="158" fill="#7E8798" font-size="8" text-anchor="middle">RESIDENCY</text>
</g>

<!-- Callout card for current position -->
<rect x="20" y="185" width="220" height="55" rx="12" fill="#1E2533" stroke="#26C6DA" stroke-opacity="0.4"/>
<text x="36" y="207" fill="#26C6DA" font-size="10" font-family="'DM Sans',sans-serif" font-weight="700">ESTÁS AQUÍ</text>
<text x="36" y="224" fill="#F8FAFF" font-size="12" font-family="'Syne',sans-serif" font-weight="800">Nivel 0 — Origins</text>

<rect x="460" y="185" width="220" height="55" rx="12" fill="#1E2533" stroke="#F2C04D" stroke-opacity="0.4"/>
<text x="476" y="207" fill="#F2C04D" font-size="10" font-family="'DM Sans',sans-serif" font-weight="700">META FINAL</text>
<text x="476" y="224" fill="#F8FAFF" font-size="12" font-family="'Syne',sans-serif" font-weight="800">Grand Challenge</text>
</svg>
